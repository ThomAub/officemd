name: CI

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request: {}

env:
  COLUMNS: 150
  FORCE_COLOR: 1
  UV_FROZEN: "1"

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: astral-sh/setup-uv@v7
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --exclude officemd_pdf --all-targets -- --force-warn clippy::pedantic -D warnings
      - name: oxlint
        working-directory: crates/officemd_js
        run: npx oxlint .
      - name: oxfmt
        working-directory: crates/officemd_js
        run: npx oxfmt --check .
      - name: ruff check
        run: uv run --project crates/officemd_python ruff check crates/officemd_python examples/python
      - name: ruff format
        run: uv run --project crates/officemd_python ruff format --check crates/officemd_python examples/python
      - name: ty check
        run: uv run --project crates/officemd_python ty check crates/officemd_python/python examples/python

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install cargo-nextest
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-nextest
          locked: true
      - name: test
        run: cargo nextest run --workspace --exclude officemd_python --cargo-quiet --failure-output final --status-level fail --no-fail-fast
      - name: cargo package dry-run
        if: matrix.os == 'ubuntu-latest'
        run: cargo package --workspace --exclude officemd_examples --exclude officemd_js --exclude officemd_python --allow-dirty --no-verify

  javascript:
    name: javascript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - name: install
        working-directory: crates/officemd_js
        run: npm install
      - name: build
        working-directory: crates/officemd_js
        run: |
          npm run build
          git checkout -- index.js index.d.ts
      - name: node tests
        working-directory: crates/officemd_js
        run: node --test tests/cli-selection.test.mjs tests/api-surface.test.mjs
      - name: bun tests
        working-directory: crates/officemd_js
        run: bun test tests/cli-selection.test.mjs
      - name: node smoke
        working-directory: crates/officemd_js
        run: node ../../examples/js/node-officemd.mjs ../../examples/data/showcase.docx
      - name: bun smoke
        working-directory: crates/officemd_js
        run: bun run ../../examples/js/bun-officemd.mjs ../../examples/data/showcase.docx
      - name: npm pack dry-run
        working-directory: crates/officemd_js
        run: npm pack --dry-run

  python:
    name: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: sync
        working-directory: crates/officemd_python
        run: uv sync --dev
      - name: build extension
        working-directory: crates/officemd_python
        run: uv run maturin develop --release
      - name: install js deps
        working-directory: crates/officemd_js
        run: npm install
      - name: build js binding
        working-directory: crates/officemd_js
        run: npm run build
      - name: pytest smoke
        working-directory: crates/officemd_python
        run: uv run pytest ../../examples/python/tests/test_showcase.py tests/test_api_surface.py -q
      - name: snapshot tests
        working-directory: crates/officemd_python
        run: uv run pytest ../../crates/tests/snapshots/ -q
      - name: binding surface parity
        run: python3 scripts/binding_surface_compare.py --require-js-runtime
      - uses: PyO3/maturin-action@v1
        name: wheel and sdist
        with:
          working-directory: crates/officemd_python
          command: build
          args: --release --sdist --strip --out dist
          rust-toolchain: stable

  check:
    if: always()
    needs: [lint, test, javascript, python]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
