name: Release

on:
  push:
    tags: ['v*']

env:
  COLUMNS: 150
  FORCE_COLOR: 1

permissions:
  contents: read

jobs:
  # ─── Python: build wheels ────────────────────────────────────────────
  python-wheels:
    name: wheel (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: ubuntu-latest, target: aarch64 }
          - { os: macos-latest,   target: x86_64 }
          - { os: macos-latest,  target: aarch64 }
          - { os: windows-latest, target: x86_64 }
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/officemd_python
          target: ${{ matrix.target }}
          args: --release --strip --out dist
          rust-toolchain: stable
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}-${{ matrix.target }}
          path: crates/officemd_python/dist

  python-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/officemd_python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: crates/officemd_python/dist

  pypi-publish:
    name: pypi
    needs: [python-wheels, python-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  # ─── npm: build native modules ──────────────────────────────────────
  npm-build:
    name: npm (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: crates/officemd_js
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-zig: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-zig: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-zig: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: mlugg/setup-zig@v2
        if: matrix.settings.use-zig
      - run: npm install
      - name: Build
        run: npx napi build --platform --release --target ${{ matrix.settings.target }} ${{ matrix.settings.use-zig && '--zig' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.settings.target }}
          path: crates/officemd_js/*.node
          if-no-files-found: error

  npm-publish:
    name: npm
    needs: [npm-build]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install
        working-directory: crates/officemd_js
      - uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: crates/officemd_js/artifacts
          merge-multiple: true
      - name: Prepare packages
        working-directory: crates/officemd_js
        run: |
          npx napi prepublish -t npm --skip-gh-release
          npx napi artifacts --dir artifacts
          ls -R npm/
      - name: Publish platform packages
        working-directory: crates/officemd_js
        run: |
          for pkg in npm/*/; do
            echo "Publishing $pkg..."
            npm publish "$pkg" --access public --provenance
          done
      - name: Publish main package
        working-directory: crates/officemd_js
        run: npm publish --access public --provenance
